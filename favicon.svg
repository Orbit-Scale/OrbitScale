<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="inf-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3366" />
      <stop offset="100%" stop-color="#99004d" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Deep dark app-icon bg -->
  <rect width="512" height="512" rx="128" fill="#111111" />
  
  <!-- Glowing backdrop for the infinity symbol -->
  <path d="M 256,256 C 320,160 440,160 440,256 C 440,352 320,352 256,256 C 192,160 72,160 72,256 C 72,352 192,352 256,256 Z" 
        fill="none" stroke="url(#inf-grad)" stroke-width="40" filter="url(#glow)" opacity="0.6" />

  <!-- Sharp, crisp foreground infinity symbol -->
  <path d="M 256,256 C 320,160 440,160 440,256 C 440,352 320,352 256,256 C 192,160 72,160 72,256 C 72,352 192,352 256,256 Z" 
        fill="none" stroke="url(#inf-grad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" />
        
  <!-- A bright white starlight/sparkle accent in the center -->
  <circle cx="256" cy="256" r="10" fill="#ffffff" filter="url(#glow)" />
  <circle cx="256" cy="256" r="6" fill="#ffffff" />
</svg>